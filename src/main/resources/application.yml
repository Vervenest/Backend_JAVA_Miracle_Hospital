spring:
  application:
    name: miracle-hospital-management

  datasource:
    url: jdbc:mysql://localhost:3306/miracledb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password:  ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        show_sql: false
        format_sql: true
    show-sql: false

  mvc:
    view:
      prefix: /WEB-INF/views/
      suffix: .jsp

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  web:
    resources:
      static-locations: classpath:/static/

server:
  port: 8080

# Firebase Configuration
firebase:
  credentials-path: classpath:firebase-credentials.json
  project-id: ${FIREBASE_PROJECT_ID}
  doctor:
    api-key: ${FIREBASE_DOCTOR_API_KEY:}
  patient:
    api-key: ${FIREBASE_PATIENT_API_KEY:}
  doctor-app-id: ${FIREBASE_DOCTOR_APP_ID:}
  patient-app-id: ${FIREBASE_PATIENT_APP_ID:}
  fcm-url: https://fcm.googleapis.com/fcm/send

# JWT Configuration
jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000

# WhatsApp / Gupshup
whatsapp:
  gupshup:
    api-key: ${GUPSHUP_API_KEY}
    template-id: d6e10d18-c3ac-46b9-9495-52ed3f44d42a
    source-number: 919380012244
    api-url: https://api.gupshup.io/sm/api/v3/app/messages/
  cloud:
    api-key:  ${CLOUD_WA_API_KEY}
    api-url: https://web.cloudwhatsapp.com/wapp/api/send

# SMS / SMS Horizon
sms:
  horizon:
    user: ${SMS_USER}
    api-key: ${SMS_API_KEY}
    sender-id: VIVRTA
    template-id: 1307162865820438610
    template-id-alt: 1307161760591340283
    api-url: https://smshorizon.co.in/api/sendsms.php

# App config
app:
  server:
    mode: DEVELOPMENT
    url: http://localhost:8080
  timezone: Asia/Kolkata
  version: 1.0.0
  base-url: http://192.168.0.123:8080

# Logging
logging:
  level:
    root: INFO
    com.miracle: DEBUG
  file:
    name: logs/application.log